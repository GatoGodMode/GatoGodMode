    <path d="M 210 310 L 210 470"/>
    <text x="214" y="488" fill="#57534e" font-size="8" font-weight="600">Staging plane</text>
  </g>
  <text x="210" y="510" text-anchor="middle" fill="#a8a29e" font-size="8">Moun I  front orthographic (conceptual, not to scale)</text>
