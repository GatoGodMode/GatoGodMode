<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 520" role="img" aria-label="Moun front schematic with callouts">
  <defs>
    <linearGradient id="chassis" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2c"/>
      <stop offset="100%" stop-color="#1a1a1b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="420" height="520" fill="#fafaf9"/>
  <text x="210" y="28" text-anchor="middle" fill="#78716c" font-size="10" font-weight="700" letter-spacing="0.2em">FRONT  SCHEMATIC</text>
  <g id="frame">
    <rect x="48" y="380" width="324" height="56" rx="4" fill="url(#chassis)" filter="url(#softShadow)"/>
    <rect x="64" y="96" width="44" height="284" rx="3" fill="url(#chassis)"/>
    <rect x="312" y="96" width="44" height="284" rx="3" fill="url(#chassis)"/>
    <rect x="64" y="72" width="292" height="36" rx="3" fill="url(#chassis)"/>
    <rect x="108" y="108" width="204" height="252" fill="none" stroke="#44403c" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  </g>
  <g id="accents">
    <ellipse cx="86" cy="240" rx="10" ry="22" fill="#ea580c"/>
    <ellipse cx="334" cy="240" rx="10" ry="22" fill="#ea580c"/>
    <ellipse cx="210" cy="88" rx="36" ry="8" fill="#ea580c"/>
    <ellipse cx="210" cy="408" rx="28" ry="8" fill="#ea580c"/>
    <ellipse cx="120" cy="88" rx="8" ry="6" fill="#ea580c"/>
    <ellipse cx="300" cy="88" rx="8" ry="6" fill="#ea580c"/>
  </g>
  <g id="bed">
    <rect x="118" y="260" width="184" height="100" rx="6" fill="#3f3f46" stroke="#52525b" stroke-width="2"/>
    <rect x="142" y="282" width="136" height="56" rx="4" fill="#2563eb" opacity="0.92"/>
    <rect x="142" y="282" width="136" height="56" rx="4" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.8"/>
  </g>
  <g id="drive">
    <rect x="130" y="352" width="72" height="22" rx="3" fill="#27272a" stroke="#52525b" stroke-width="1"/>
    <rect x="218" y="352" width="72" height="22" rx="3" fill="#27272a" stroke="#52525b" stroke-width="1"/>
    <circle cx="152" cy="363" r="6" fill="#64748b" opacity="0.9"/>
    <circle cx="254" cy="363" r="6" fill="#64748b" opacity="0.9"/>
    <text x="166" y="367" font-size="7" fill="#a1a1aa">MOTOR</text>
    <text x="268" y="367" font-size="7" fill="#a1a1aa">MOTOR</text>
  </g>
  <g id="controls">
    <rect x="318" y="118" width="28" height="72" rx="3" fill="#1c1917" stroke="#44403c"/>
    <circle cx="332" cy="134" r="7" fill="#292524" stroke="#57534e"/>
    <rect x="325" y="152" width="14" height="6" rx="1" fill="#78716c"/>
    <rect x="325" y="166" width="16" height="10" rx="2" fill="#b91c1c" opacity="0.85"/>
